spring.application.name=identity-service
server.port=8081

spring.config.import=optional:configserver:http://localhost:8888
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
spring.cloud.client.hostname=localhost

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 15 minutes
jwt.expiration=900000
# 7 days
jwt.refresh-expiration=604800000

# Flyway — spec §8 automated migrations. baseline-on-migrate=true so existing
# databases adopt the migration history at V0 instead of failing.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# PII column encryption (spec §8). Override in production via env var.
edulink.pii.encryption-key=${EDULINK_PII_KEY:edulink-default-dev-key-change-me}